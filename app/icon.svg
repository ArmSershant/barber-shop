<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stripes" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <rect width="12" height="4" y="0" fill="#7c3328" />
      <rect width="12" height="4" y="4" fill="#fff7ea" />
      <rect width="12" height="4" y="8" fill="#a8812f" />
    </pattern>
    <clipPath id="pole">
      <rect x="9" y="1" width="14" height="30" rx="7" />
    </clipPath>
  </defs>
  <g clip-path="url(#pole)">
    <rect x="9" y="1" width="14" height="30" fill="url(#stripes)" />
  </g>
  <rect x="9" y="1" width="14" height="30" rx="7" fill="none" stroke="#a8812f" stroke-width="1.5" />
</svg>
